services:
  app:
    build: .
    container_name: suitecrm_app
    env_file:
      - .env
    environment:
      - TZ=America/Argentina/Mendoza
      - WHATSAPP_API_URL=${WHATSAPP_API_URL:-https://wa-api.grupoamericainterior.com.ar}
      - WHATSAPP_WEBHOOK_TOKEN=${WHATSAPP_WEBHOOK_TOKEN:-your_secure_token_here}
      - SUITECRM_URL=${SUITECRM_URL:-https://crm.grupoamericainterior.com.ar}
      - WHATSAPP_LOG_LEVEL=${WHATSAPP_LOG_LEVEL:-info}
    ports:
      - "8097:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
  db:
    image: mariadb:10.6
    container_name: suitecrm_db
    environment:
      - TZ=America/Argentina/Mendoza
      - MARIADB_ROOT_PASSWORD=rootpass
      - MARIADB_DATABASE=suitecrm
      - MARIADB_USER=suitecrm
      - MARIADB_PASSWORD=suitecrm_pass
    ports:
      - "33069:3306"
    volumes:
      - db_data:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: suitecrm_pma
    environment:
      - PMA_HOST=db
      - PMA_USER=suitecrm
      - PMA_PASSWORD=suitecrm_pass
    ports:
      - "8098:80"
    depends_on:
      - db
volumes:
  db_data:
