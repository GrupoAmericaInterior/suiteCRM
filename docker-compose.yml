services:
  app:
    build: .
    container_name: suitecrm_app
    environment:
      - TZ=America/Argentina/Mendoza
      - COMPOSER_ALLOW_SUPERUSER=1
    ports:
      - "8097:80"
    volumes:
      - ./:/var/www/html
    command: ["bash", "/var/www/html/docker/startup.sh"]
    depends_on:
      - db
  scheduler:
    build: .
    container_name: suitecrm_scheduler
    environment:
      - TZ=America/Argentina/Mendoza
      - COMPOSER_ALLOW_SUPERUSER=1
    volumes:
      - ./:/var/www/html
    command:
      [
        "bash",
        "-lc",
        "while true; do php -f /var/www/html/cron.php; sleep 60; done"
      ]
    depends_on:
      - app
      - db
  db:
    image: mariadb:10.6
    container_name: suitecrm_db
    environment:
      - TZ=America/Argentina/Mendoza
      - MARIADB_ROOT_PASSWORD=rootpass
      - MARIADB_DATABASE=suitecrm
      - MARIADB_USER=suitecrm
      - MARIADB_PASSWORD=suitecrm_pass
    ports:
      - "33069:3306"
    volumes:
      - db_data:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: suitecrm_pma
    environment:
      - PMA_HOST=db
      - PMA_USER=suitecrm
      - PMA_PASSWORD=suitecrm_pass
    ports:
      - "8098:80"
    depends_on:
      - db
volumes:
  db_data:
